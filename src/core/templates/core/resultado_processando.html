{% extends "core/base.html" %}

{% block title %}Status do Pedido{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <a href="{% url 'core:home' %}" class="btn btn-outline-secondary mb-3">Voltar</a>

        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white text-center py-4">
                <h4 class="mb-1">Status do Pedido</h4>
                <span class="badge bg-light text-primary">NFe: 44250</span>
            </div>
            <div class="card-body text-center p-4">
                <span class="badge bg-warning text-dark fs-5 p-3">Em processamento</span>
                <p class="text-muted mt-3 mb-0">As informações de entrega ainda estão sendo atualizadas. Tente consultar novamente em algumas horas.</p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
