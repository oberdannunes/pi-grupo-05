<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow result-card mt-4">
                <div class="card-body p-4 text-center">
                    <h5 class="fw-bold mb-1" style="color: #150b5e;">Status do Pedido</h5>
                    <span class="badge text-white mb-3" style="background: #150b5e;">NFe: {{ pedido.nfe }}</span>

                    {% block delivery_info %}
                    {% endblock %}
                </div>
            </div>

            <a href="{% url 'core:home' %}" class="btn btn-outline-secondary mt-3 mb-3" style="border-radius: 8px;">Voltar</a>

        </div>
    </div>
</div>
