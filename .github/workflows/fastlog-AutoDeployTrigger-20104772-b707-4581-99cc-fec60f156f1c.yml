name: Trigger auto deployment for fastlog

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/fastlog-AutoDeployTrigger-20104772-b707-4581-99cc-fec60f156f1c.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.FASTLOG_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.FASTLOG_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.FASTLOG_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}src
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.FASTLOG_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.FASTLOG_REGISTRY_PASSWORD }}
          containerAppName: fastlog
          resourceGroup: univesp-pi-05
          imageToBuild: oberdannunes/fastlog:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


